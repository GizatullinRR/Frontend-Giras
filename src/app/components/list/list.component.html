<div class="list-container">
    <div class="list-content">
        @if (isLoading()) {
            <div class="loading">Загрузка...</div>
        } @else if (items().length === 0) {
            <div class="empty">Ничего не найдено</div>
        } @else {
            <div class="list" #listRef
                (dragover)="onListDragOver($event)"
                (drop)="onDrop($event)"
                (dragleave)="onDragLeave($event)">
                @for (item of items(); track item.id; let i = $index) {
                    <div class="list-item"
                        [class.selected]="selectedItem()?.id === item.id"
                        [class.is-dragging]="draggedIndex() === i"
                        [style.transform]="getItemTransform(i)"
                        [attr.draggable]="draggableItemId() === item.id"
                        (click)="onSelect(item)"
                        (dragstart)="onDragStart($event, i)"
                        (dragend)="onDragEnd($event)">
                        <div class="item-main">
                            <div class="drag-handle"
                                (mousedown)="onHandleMouseDown(item.id, $event)"
                                (mouseup)="draggableItemId.set(null)">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>

                            <span class="item-name">{{ item.name }}</span>

                            <div class="item-actions">
                                <button class="action-btn copy-btn" type="button" (click)="onCopy(item.id, $event)">
                                    <lucide-icon [img]="Copy" [size]="14" />
                                </button>
                                <button class="action-btn delete-btn" type="button" (click)="onDelete(item.id, $event)">
                                    <lucide-icon [img]="Trash2" [size]="14" />
                                </button>
                            </div>
                        </div>

                        <div class="item-sub">
                            <span class="meta-chip color-chip">
                                <span class="color-dot"></span>
                                <span class="chip-text">{{ item.color }}</span>
                            </span>
                            <span class="meta-chip set-chip">
                                <span class="chip-label">Комплект</span>
                                <span class="chip-text">{{ item.set }}</span>
                            </span>
                            <span class="meta-chip category-chip">
                                <span class="chip-label">Категория</span>
                                <span class="chip-text">{{ item.category }}</span>
                            </span>
                            @if (item.isCertified) {
                                <span class="meta-chip cert-chip" title="Минпромторг">
                                    <lucide-icon [img]="ShieldCheck" [size]="13" />
                                    <span class="chip-text">Минпром</span>
                                </span>
                            }
                        </div>
                    </div>
                }
            </div>
        }
    </div>
</div>
